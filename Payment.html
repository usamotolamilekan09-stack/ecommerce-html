<!doctype html>
<html>
<head>
    <title>Payment</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 0;
            padding: 0;
        }
        
        .payment-page{
            width: 80%;
            margin: 40px auto;
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .payment-page img{
            width: 300px;
            height: 300px;
            object-fit: cover;
            border-radius: 10px;
        }

        .price{
            font-size: 24px;
            font-weight: bold;
            color: #222;
        }

        .btn{
            display: inline-block;
            padding: 12px 18px;
            background-color: #f68b1e;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        
        .btn-hover{
            background-color: #d9730d;
        }

        .back-line{
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #f68b1e;
            font-weight: bold;
        }

        .payment-form{
            max-width: 400px;
            margin: 0 auto;
            text-align: left;
        }

        .payment-form label{
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        .payment-form input,
        .payment-form select{
            width: 100%;
            padding: 10px;
            margin: 5px 0 15px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .btn{
            display: inline-block;
            padding: 12px 18px;
            background-color: #f68b1e;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        .btn:hover{
            background-color: #d9730d;
        }
    </style>
</head>
<body>
    <div class="payment-page">
        <h1>Choose Payment Type</h1>
        <p>Please select a payment route</p>
        <div style="margin: 20px 0;">
            <a href="bank-transfer.html" class="btn">Bank Transfer</a>
            <a href="other-payment.html" class="btn" style="margin-left: 12px;">Other Methods</a>
        </div>
        <br>
        <a class="back-line" href="index.html">Back to Home</a>
    </div>
</body>
</html>
