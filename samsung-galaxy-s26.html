<!doctype html>
<html>
<head>
    <title>Samsung Galaxy S26</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 0;
            padding: 0;
        }
        
        .product-page{
            width: 80%;
            margin: 40px auto;
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .product-page img{
            width: 300px;
            height: 300px;
            object-fit: cover;
            border-radius: 10px;
        }

        .price{
            font-size: 24px;
            font-weight: bold;
            color: #222;
        }

        .btn{
            display: inline-block;
            padding: 12px 18px;
            background-color: #f68b1e;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        
        .btn-hover{
            background-color: #d9730d;
        }

        .back-line{
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #f68b1e;
            font-weight: bold;
        }

        .overlay{
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);   
        }

        .overlay:target{
            display: block;
        }
    
        .checkout-box{
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .checkout-box h2{
            margin-top: 0;    
        }

        .checkout-box input{
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        } 

        .close-btn{
            background-color: #ccc;
            color: #222;
        }
    </style>
</head>
<body>
    <div class="product-page">
        <h1>Samsung Galaxy S26</h1>
        <img src="samsung-galaxy-s26.jpg" alt="Samsung Galaxy S26">
        <p class="price">₦200,000</p>
        <p>Advanced AI features powered by Galaxy AI for enhanced productivity and creativity</p>
        <a href="#checkout" class="btn">Buy now</a>
        <br>
        <a class="back-line" href="index.html">Back to Home</a>
    </div> 
    <div id="checkout" class="overlay">
        <div class="checkout-box">
            <h2>Checkout</h2>
            <p><strong>Product:</strong> Samsung Galaxy S26</p>
            <p><strong>Price:</strong> ₦200,000</p>
            
            <label>Full Name:</label>
            <input type="text" placeholder="Enter your name">
            <label>Email:</label>
            <input type="text" placeholder="Enter your email">
            
            <label>Address:</label> 
            <input type="text" placeholder="Enter delivery address">
            <a href="payment.html" class="btn">Place Order</a>
            <a href="" class="btn close-btn">Close</a>    
        </div>
    </div>   
</body>
</html>
