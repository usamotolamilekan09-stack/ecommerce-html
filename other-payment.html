<!doctype html>
<html>
<head>
    <title>Other Payment Methods</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 0;
            padding: 0;
        }

        .payment-page{
            width: 80%;
            margin: 40px auto;
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .payment-form{
            max-width: 400px;
            margin: 0 auto;
            text-align: left;
        }

        .payment-form label{
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        .payment-form input,
        .payment-form select{
            width: 100%;
            padding: 10px;
            margin: 5px 0 15px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .btn{
            display: inline-block;
            padding: 12px 18px;
            background-color: #f68b1e;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        .btn:hover{
            background-color: #d9730d;
        }

        .back-line{
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #f68b1e;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="payment-page">
        <h1>Other Payment Methods</h1>
        <form class="payment-form" action="thank-you.html" method="get">
            <label for="payment-method">Payment Method</label>
            <select id="payment-method" name="payment-method" required>
                <option value="">Select Payment Method</option>
                <option value="debit-card">Debit Card</option>
                <option value="credit-card">Credit Card</option>
                <option value="paypal">PayPal</option>
            </select>

            <label for="card-number">Card Number</label>
            <input type="text" id="card-number" name="card-number" placeholder="1234 5678 9012 3456" required>

            <label for="expiry">Expiry Date</label>
            <input type="text" id="expiry" name="expiry" placeholder="MM/YY" required>

            <label for="cvv">CVV</label>
            <input type="text" id="cvv" name="cvv" placeholder="123" required>

            <label for="name">Name on Card</label>
            <input type="text" id="name" name="name" placeholder="John Doe" required>

            <button type="submit" class="btn">Complete Payment</button>
        </form>
        <br>
        <a class="back-line" href="Payment.html">Back to Payment Options</a>
    </div>
</body>
</html>
