<!doctype html>
<html>
<head>
    <title>Thank You - Lakeside Store</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 0;
            padding: 0;
        }

        .thank-you-page{
            width: 80%;
            margin: 80px auto;
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .thank-you-page h1{
            color: #2a7d17;
            margin-bottom: 20px;
        }

        .thank-you-page p{
            font-size: 18px;
            margin-bottom: 30px;
        }

        .btn{
            display: inline-block;
            padding: 12px 18px;
            background-color: #f68b1e;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 16px;
        }

        .btn:hover{
            background-color: #d9730d;
        }
    </style>
</head>
<body>
    <div class="thank-you-page">
        <h1>Thank you for your payment!</h1>
        <p>Your order is confirmed and being processed. We appreciate your business.</p>
        <a class="btn" href="index.html">Back to Home</a>
    </div>
</body>
</html>
